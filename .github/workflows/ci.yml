name: CI

on:
  push:
    branches: [main]
    paths:
      - 'worldcup-predictor/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'worldcup-predictor/**'
      - '.github/workflows/ci.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldcup-predictor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
