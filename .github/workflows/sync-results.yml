name: Sync results (openfootball)

# Hands-off result entry. Pulls finished knockout scores (final score, extra
# time, penalties) from the public-domain openfootball dataset into Supabase on a
# schedule, so matches update automatically — even overnight. Fill-only: a result
# already entered by the admin is never overwritten. Requires repo secrets
# SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY (service key — server-side only).
# Disable by deleting this file if you'd rather enter results from the Admin panel.

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch: # manual "Run workflow" button

concurrency:
  group: sync-results
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldcup-predictor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run sync:results
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
